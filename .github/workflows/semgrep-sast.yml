name: Semgrep SAST

on:
  push:
    branches: [ "master", "main" ]

jobs:
  semgrep:
    name: Scan code with Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config autoسسس